<!-- Captura de errores en pantalla (para que nada quede "en blanco" en silencio) -->
<script>
  (function () {
    function showWdError(msg) {
      var d = document.getElementById('wd-err');
      if (!d) {
        d = document.createElement('div');
        d.id = 'wd-err';
        d.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:2147483647;' +
          'background:#7f1d1d;color:#fff;font:12px/1.5 ui-monospace,Menlo,monospace;' +
          'padding:10px 40px 10px 14px;white-space:pre-wrap;max-height:45vh;overflow:auto;';
        var x = document.createElement('button');
        x.textContent = '✕';
        x.style.cssText = 'position:absolute;top:6px;right:10px;background:transparent;border:0;color:#fff;font-size:16px;cursor:pointer';
        x.onclick = function () { d.remove(); };
        document.body.appendChild(d);
        d.appendChild(x);
      }
      var p = document.createElement('div');
      p.textContent = '⚠ ' + msg;
      d.appendChild(p);
    }
    window.addEventListener('error', function (e) {
      showWdError((e.error && (e.error.message + '\n' + (e.error.stack || ''))) || e.message || 'Error');
    });
    window.addEventListener('unhandledrejection', function (e) {
      var r = e.reason;
      showWdError('Promise: ' + ((r && (r.message + '\n' + (r.stack || ''))) || r));
    });
    window.__wdShowError = showWdError;
  })();
</script>
